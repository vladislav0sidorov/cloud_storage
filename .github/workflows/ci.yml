# CI: клиент, сервер, compose build; CD: GHCR + деплой на VPS.
# Переменные деплоя: deploy/docs/GITHUB_ENVIRONMENT.md
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # ручной запуск в Actions

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloud-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Production build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:4000/api' }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL || 'ws://localhost:4000' }}
        run: npm run build

  server:
    name: Server — install & syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloud-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (entry)
        run: node --check index.js

  docker:
    name: Docker — compose build
    runs-on: ubuntu-latest
    needs: [client, server]
    steps:
      - uses: actions/checkout@v4

      # compose ожидает cloud-server/.env (в .gitignore) — единый шаблон для CI
      - name: Placeholder .env for compose
        run: cp deploy/ci/placeholder.env cloud-server/.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images (no push)
        env:
          DOCKER_BUILDKIT: 1
        run: docker compose build

  push-images:
    name: CD — push images to GHCR
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: read
      packages: write
    outputs:
      ghcr_prefix: ${{ steps.ghcr.outputs.prefix }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image prefix
        id: ghcr
        run: |
          echo "prefix=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./cloud-server
          push: true
          tags: ${{ steps.ghcr.outputs.prefix }}/cloud-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./cloud-client
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'http://localhost:4000/api' }}
            VITE_WS_URL=${{ vars.VITE_WS_URL || 'ws://localhost:4000' }}
          tags: ${{ steps.ghcr.outputs.prefix }}/cloud-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Автодеплой: список имён для appleboy envs = deploy/docs/GITHUB_ENVIRONMENT.md
  deploy-vps:
    name: CD — deploy on VPS
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.VPS_GITHUB_ENVIRONMENT != ''
    runs-on: ubuntu-latest
    needs: [push-images]
    environment: ${{ vars.VPS_GITHUB_ENVIRONMENT }}
    env:
      GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
      GHCR_USER: ${{ github.actor }}
      # Ниже — в Environment/репозитории; на VPS .env не обязателен, compose читает export из SSH-сессии
      PORT: ${{ vars.DEPLOY_PORT || '4000' }}
      API_URL: ${{ vars.API_URL }}
      CLIENT_URL: ${{ vars.CLIENT_URL }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
      REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
      SKIP_MAIL: ${{ vars.SKIP_MAIL || 'true' }}
      SMTP_HOST: ${{ vars.SMTP_HOST }}
      SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
      SMTP_USER: ${{ vars.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      DOMAIN: ${{ vars.DOMAIN }}
      CADDY_EMAIL: ${{ vars.CADDY_EMAIL }}
      DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/opt/cloud_storage/deploy' }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync GHCR prefix from image job
        run: echo "GHCR_PREFIX=${{ needs.push-images.outputs.ghcr_prefix }}" >> "$GITHUB_ENV"

      - name: Make deploy script executable
        run: chmod +x deploy/scripts/remote-docker-deploy.sh

      - name: Validate deploy variables
        env:
          GHCR_PREFIX: ${{ needs.push-images.outputs.ghcr_prefix }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER || 'root' }}
          DOMAIN: ${{ vars.DOMAIN }}
          API_URL: ${{ vars.API_URL }}
          CLIENT_URL: ${{ vars.CLIENT_URL }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
        run: |
          required=(GHCR_PREFIX VPS_HOST VPS_USER DOMAIN API_URL CLIENT_URL ACCESS_TOKEN_SECRET REFRESH_TOKEN_SECRET)
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Required deploy variable is empty: $name"
              exit 1
            fi
          done

      - name: Prepare SSH key (file + format validation)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          KEY_FILE="/tmp/gha_deploy.pem"
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "::error::Секрет VPS_SSH_PRIVATE_KEY пустой (Environment или репозиторий)."
            exit 1
          fi
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$KEY_FILE"
          tr -d '\r' < "$KEY_FILE" > "${KEY_FILE}.tmp" && mv "${KEY_FILE}.tmp" "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          if ! grep -qE 'BEGIN (OPENSSH|EC|RSA) PRIVATE KEY' "$KEY_FILE"; then
            echo "::error::В секрете нет блока BEGIN … PRIVATE KEY."
            exit 1
          fi

      - name: SSH — pull & up
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER || 'root' }}
          key_path: /tmp/gha_deploy.pem
          port: ${{ vars.VPS_PORT || '22' }}
          envs: GHCR_TOKEN,GHCR_USER,GHCR_PREFIX,PORT,API_URL,CLIENT_URL,MONGODB_URI,ACCESS_TOKEN_SECRET,REFRESH_TOKEN_SECRET,SKIP_MAIL,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASSWORD,DOMAIN,CADDY_EMAIL,DEPLOY_PATH
          script_path: deploy/scripts/remote-docker-deploy.sh
