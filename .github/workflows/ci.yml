# CI: линт и сборка клиента, проверка сервера, сборка Docker-образов.
# CD: push или workflow_dispatch на main → образы в GHCR; при VPS_DEPLOY=true → SSH на VPS, pull и up.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # ручной запуск в Actions

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloud-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Production build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:4000/api' }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL || 'ws://localhost:4000' }}
        run: npm run build

  server:
    name: Server — install & syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloud-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (entry)
        run: node --check index.js

  docker:
    name: Docker — compose build
    runs-on: ubuntu-latest
    needs: [client, server]
    steps:
      - uses: actions/checkout@v4

      # compose ожидает cloud-server/.env (файл в .gitignore)
      - name: Placeholder .env for compose
        run: |
          cat > cloud-server/.env << 'EOF'
          PORT=4000
          MONGODB_URI=mongodb://mongo:27017/cloud_storage
          API_URL=http://localhost:4000
          CLIENT_URL=http://localhost
          ACCESS_TOKEN_SECRET=ci-placeholder-access-not-for-prod
          REFRESH_TOKEN_SECRET=ci-placeholder-refresh-not-for-prod
          SKIP_MAIL=true
          SMTP_HOST=localhost
          SMTP_PORT=587
          SMTP_USER=ci@localhost
          SMTP_PASSWORD=ci
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images (no push)
        env:
          DOCKER_BUILDKIT: 1
        run: docker compose build

  push-images:
    name: CD — push images to GHCR
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image prefix
        id: ghcr
        run: |
          echo "prefix=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./cloud-server
          push: true
          tags: ${{ steps.ghcr.outputs.prefix }}/cloud-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./cloud-client
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'http://localhost:4000/api' }}
            VITE_WS_URL=${{ vars.VITE_WS_URL || 'ws://localhost:4000' }}
          tags: ${{ steps.ghcr.outputs.prefix }}/cloud-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Автодеплой на VPS после публикации образов.
  # Секреты/переменные в GitHub Environment: в РЕПОЗИТОРИИ (Variables) задайте VPS_GITHUB_ENVIRONMENT = точное имя окружения из Settings → Environments.
  # Условие job if не видит переменные только внутри Environment — поэтому имя окружения задаётся репозиторной переменной; отключить деплой = очистить VPS_GITHUB_ENVIRONMENT.
  deploy-vps:
    name: CD — deploy on VPS
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.VPS_GITHUB_ENVIRONMENT != ''
    runs-on: ubuntu-latest
    needs: [push-images]
    environment: ${{ vars.VPS_GITHUB_ENVIRONMENT }}
    env:
      GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
      GHCR_USER: ${{ github.actor }}
    steps:
      - name: Подготовить SSH-ключ (файл + проверка формата)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          KEY_FILE="/tmp/gha_deploy.pem"
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "::error::Секрет VPS_SSH_PRIVATE_KEY пустой (Environment или репозиторий)."
            exit 1
          fi
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$KEY_FILE"
          tr -d '\r' < "$KEY_FILE" > "${KEY_FILE}.tmp" && mv "${KEY_FILE}.tmp" "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          if ! grep -qE 'BEGIN (OPENSSH|EC|RSA) PRIVATE KEY' "$KEY_FILE"; then
            echo "::error::В секрете нет блока BEGIN … PRIVATE KEY."
            exit 1
          fi

      - name: Переменные для docker compose на сервере (GHCR / CORS)
        run: |
          echo "GHCR_PREFIX=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "CLIENT_URL=${{ vars.CLIENT_URL }}" >> "$GITHUB_ENV"

      - name: SSH — pull & up
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER || 'root' }}
          key_path: /tmp/gha_deploy.pem
          port: ${{ vars.VPS_PORT || '22' }}
          envs: GHCR_TOKEN,GHCR_USER,GHCR_PREFIX,CLIENT_URL
          script: |
            set -euo pipefail
            export GHCR_PREFIX
            export CLIENT_URL
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            cd "${{ vars.VPS_DEPLOY_PATH || '/opt/cloud_storage/deploy' }}"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
