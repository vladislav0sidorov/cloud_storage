# CI: линт и сборка клиента, проверка сервера, сборка Docker-образов.
# CD: при push в main — публикация образов в GitHub Container Registry (GHCR).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # ручной запуск в Actions

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloud-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Production build
        env:
          VITE_API_URL: http://localhost:4000/api
          VITE_WS_URL: ws://localhost:4000
        run: npm run build

  server:
    name: Server — install & syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloud-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (entry)
        run: node --check index.js

  docker:
    name: Docker — compose build
    runs-on: ubuntu-latest
    needs: [client, server]
    steps:
      - uses: actions/checkout@v4

      # compose ожидает cloud-server/.env (файл в .gitignore)
      - name: Placeholder .env for compose
        run: |
          cat > cloud-server/.env << 'EOF'
          PORT=4000
          MONGODB_URI=mongodb://mongo:27017/cloud_storage
          API_URL=http://localhost:4000
          CLIENT_URL=http://localhost
          ACCESS_TOKEN_SECRET=ci-placeholder-access-not-for-prod
          REFRESH_TOKEN_SECRET=ci-placeholder-refresh-not-for-prod
          SKIP_MAIL=true
          SMTP_HOST=localhost
          SMTP_PORT=587
          SMTP_USER=ci@localhost
          SMTP_PASSWORD=ci
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images (no push)
        env:
          DOCKER_BUILDKIT: 1
        run: docker compose build

  push-images:
    name: CD — push images to GHCR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image prefix
        id: ghcr
        run: |
          echo "prefix=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./cloud-server
          push: true
          tags: ${{ steps.ghcr.outputs.prefix }}/cloud-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./cloud-client
          push: true
          build-args: |
            VITE_API_URL=http://localhost:4000/api
            VITE_WS_URL=ws://localhost:4000
          tags: ${{ steps.ghcr.outputs.prefix }}/cloud-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
